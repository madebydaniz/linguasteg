name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release token
        if: ${{ secrets.RELEASE_PLEASE_TOKEN == '' }}
        run: |
          echo "RELEASE_PLEASE_TOKEN is not configured."
          echo "Add a fine-grained PAT in repo secrets so release PR checks can run."
          exit 1

      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
