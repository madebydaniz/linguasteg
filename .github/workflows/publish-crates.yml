name: publish-crates

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (for example linguasteg-v0.2.0)
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}

permissions:
  contents: read

concurrency:
  group: publish-crates
  cancel-in-progress: false

jobs:
  preflight:
    if: startsWith(env.RELEASE_TAG, 'linguasteg-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish preflight
        run: ./scripts/ci/publish_release.sh preflight "${{ env.RELEASE_TAG }}"

  dry-run:
    if: startsWith(env.RELEASE_TAG, 'linguasteg-v')
    runs-on: ubuntu-latest
    needs:
      - preflight
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish dry-run
        run: ./scripts/ci/publish_release.sh dry-run

  publish:
    if: startsWith(env.RELEASE_TAG, 'linguasteg-v')
    runs-on: ubuntu-latest
    needs:
      - preflight
      - dry-run
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish workspace crates
        run: ./scripts/ci/publish_release.sh publish
