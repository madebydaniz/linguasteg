name: publish-crates

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (for example linguasteg-v0.2.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-crates
  cancel-in-progress: false

jobs:
  preflight:
    if: startsWith(github.event.inputs.release_tag || github.event.release.tag_name, 'linguasteg-v')
    outputs:
      checkout_tag: ${{ steps.refs.outputs.checkout_tag }}
      semver_tag: ${{ steps.refs.outputs.semver_tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow tooling
        uses: actions/checkout@v4
        with:
          ref: main
          path: tooling

      - name: Resolve release refs
        id: refs
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.release_tag || github.event.release.tag_name }}"
          if [[ "${TAG}" =~ ^linguasteg-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "checkout_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "semver_tag=v${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          elif [[ "${TAG}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "checkout_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "semver_tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::unsupported release tag '${TAG}'"
            exit 1
          fi

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.refs.outputs.checkout_tag }}
          path: release-src

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish preflight
        run: cd release-src && ../tooling/scripts/ci/publish_release.sh preflight "${{ steps.refs.outputs.semver_tag }}"

  dry-run:
    if: startsWith(github.event.inputs.release_tag || github.event.release.tag_name, 'linguasteg-v')
    runs-on: ubuntu-latest
    needs:
      - preflight
    steps:
      - name: Checkout workflow tooling
        uses: actions/checkout@v4
        with:
          ref: main
          path: tooling

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.checkout_tag }}
          path: release-src

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish dry-run
        run: cd release-src && ../tooling/scripts/ci/publish_release.sh dry-run

  publish:
    if: startsWith(github.event.inputs.release_tag || github.event.release.tag_name, 'linguasteg-v')
    runs-on: ubuntu-latest
    needs:
      - preflight
      - dry-run
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - name: Checkout workflow tooling
        uses: actions/checkout@v4
        with:
          ref: main
          path: tooling

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.checkout_tag }}
          path: release-src

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish workspace crates
        run: cd release-src && ../tooling/scripts/ci/publish_release.sh publish
