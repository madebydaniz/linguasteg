name: publish-crates

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: publish-crates
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish preflight
        run: ./scripts/ci/publish_release.sh preflight "${{ github.event.release.tag_name }}"

  dry-run:
    runs-on: ubuntu-latest
    needs:
      - preflight
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish dry-run
        run: ./scripts/ci/publish_release.sh dry-run

  publish:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - dry-run
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish workspace crates
        run: ./scripts/ci/publish_release.sh publish
